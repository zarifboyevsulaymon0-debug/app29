<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter Pro</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .converter-card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 380px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #64748b; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .result-box { background: #eff6ff; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; border: 1px dashed var(--primary); }
        .result-box span { display: block; font-size: 24px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>O'lchov Birliklari</h2>
    
    <div class="input-group">
        <label>Qiymatni kiriting:</label>
        <input type="number" id="inputValue" placeholder="0" oninput="convert()">
    </div>

    <div class="input-group">
        <label>Nimadan:</label>
        <select id="fromUnit" onchange="convert()">
            <optgroup label="Uzunlik">
                <option value="km">Kilometr</option>
                <option value="m">Metr</option>
                <option value="mile">Milya</option>
            </optgroup>
            <optgroup label="Og'irlik">
                <option value="kg">Kilogramm</option>
                <option value="lb">Funt (lb)</option>
            </optgroup>
        </select>
    </div>

    <div class="input-group">
        <label>Nimaga:</label>
        <select id="toUnit" onchange="convert()">
            <optgroup label="Uzunlik">
                <option value="m">Metr</option>
                <option value="km">Kilometr</option>
                <option value="mile">Milya</option>
            </optgroup>
            <optgroup label="Og'irlik">
                <option value="kg">Kilogramm</option>
                <option value="lb">Funt (lb)</option>
            </optgroup>
        </select>
    </div>

    <div class="result-box">
        <small>Natija:</small>
        <span id="resultDisplay">0</span>
    </div>
</div>

<script>
    const factors = {
        km: 1000, m: 1, mile: 1609.34,
        kg: 1, lb: 0.453592
    };

    function convert() {
        const val = parseFloat(document.getElementById('inputValue').value);
        const from = document.getElementById('fromUnit').value;
        const to = document.getElementById('toUnit').value;
        const display = document.getElementById('resultDisplay');

        if (isNaN(val)) {
            display.innerText = "0";
            return;
        }

        // Agar birliklar har xil turda bo'lsa (masalan, km dan kg ga)
        const lengthUnits = ['km', 'm', 'mile'];
        const weightUnits = ['kg', 'lb'];

        if ((lengthUnits.includes(from) && weightUnits.includes(to)) || 
            (weightUnits.includes(from) && lengthUnits.includes(to))) {
            display.innerText = "Xato!";
            return;
        }

        // Hisoblash: Avval asosiy birlikka (metr yoki kg), keyin maqsad birlikka
        const baseValue = val * factors[from];
        const result = baseValue / factors[to];

        display.innerText = result.toLocaleString(undefined, {maximumFractionDigits: 4});
    }
</script>

</body>
</html>
